openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HireTrack Job Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: jobs
    description: Job listing operations
  - name: applications
    description: Application operations
  - name: profile
    description: User profile operations
  - name: companies
    description: Company profile operations
  - name: dashboard
    description: Dashboard and analytics
  - name: notifications
    description: In-app notification operations
  - name: alerts
    description: Job alert operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshBody"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update candidate profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profile/resume:
    post:
      operationId: uploadResume
      tags: [profile]
      summary: Upload resume (base64 PDF)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadResumeBody"
      responses:
        "200":
          description: Resume uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeUploadResponse"

  /companies/me:
    get:
      operationId: getMyCompany
      tags: [companies]
      summary: Get recruiter's company profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Company profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    put:
      operationId: updateCompany
      tags: [companies]
      summary: Update company profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get company by ID
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs with search and filter
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: keyword
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: skills
          in: query
          schema:
            type: string
        - name: jobType
          in: query
          schema:
            type: string
            enum: [full-time, part-time, contract, internship, remote]
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsListResponse"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job posting (recruiter)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/featured:
    get:
      operationId: getFeaturedJobs
      tags: [jobs]
      summary: Get featured/recent jobs for landing page
      responses:
        "200":
          description: Featured jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job by ID
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job posting (recruiter)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job posting (recruiter)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /jobs/saved:
    get:
      operationId: getSavedJobs
      tags: [jobs]
      summary: Get candidate's saved jobs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Saved jobs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{jobId}/save:
    post:
      operationId: saveJob
      tags: [jobs]
      summary: Save a job (candidate)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    delete:
      operationId: unsaveJob
      tags: [jobs]
      summary: Remove a saved job (candidate)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job unsaved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /jobs/{jobId}/applications:
    get:
      operationId: getJobApplications
      tags: [applications]
      summary: Get all applicants for a job (recruiter)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /applications:
    post:
      operationId: applyForJob
      tags: [applications]
      summary: Apply for a job (candidate)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    get:
      operationId: getMyApplications
      tags: [applications]
      summary: Get candidate's own applications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Applications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /applications/{applicationId}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status (recruiter ATS)
      security:
        - bearerAuth: []
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /dashboard/recruiter:
    get:
      operationId: getRecruiterDashboard
      tags: [dashboard]
      summary: Recruiter dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterDashboard"

  /dashboard/candidate:
    get:
      operationId: getCandidateDashboard
      tags: [dashboard]
      summary: Candidate dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Candidate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDashboard"

  /alerts:
    get:
      operationId: getMyAlerts
      tags: [alerts]
      summary: Get candidate's job alerts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of job alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobAlert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a job alert (candidate)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlertBody"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAlert"

  /alerts/{alertId}:
    delete:
      operationId: deleteAlert
      tags: [alerts]
      summary: Delete a job alert (candidate)
      security:
        - bearerAuth: []
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notifications with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required: [message]

  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: notificationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /messages/{applicationId}:
    get:
      operationId: getMessageThread
      tags: [messages]
      summary: Get message thread for an application
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageThreadResponse"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in an application thread
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /messages/{applicationId}/read:
    patch:
      operationId: markThreadRead
      tags: [messages]
      summary: Mark all messages in a thread as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required: [message]

  /messages/unread-count:
    get:
      operationId: getUnreadMessageCount
      tags: [messages]
      summary: Get total unread message count for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer
                required: [unreadCount]

  /applications/{applicationId}/interview:
    get:
      operationId: getInterview
      tags: [applications]
      summary: Get interview details for an application
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interview details or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSchedule"
        "404":
          description: No interview scheduled
    post:
      operationId: scheduleInterview
      tags: [applications]
      summary: Schedule an interview (recruiter)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInterviewBody"
      responses:
        "201":
          description: Interview scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSchedule"
    patch:
      operationId: respondToInterview
      tags: [applications]
      summary: Respond to an interview invite (candidate)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterviewResponseBody"
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSchedule"

  /applications/{applicationId}/notes:
    get:
      operationId: getApplicationNotes
      tags: [applications]
      summary: Get recruiter notes for an application
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicantNote"
    post:
      operationId: createApplicationNote
      tags: [applications]
      summary: Add a recruiter note to an application
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteBody"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicantNote"

  /applications/{applicationId}/notes/{noteId}:
    delete:
      operationId: deleteApplicationNote
      tags: [applications]
      summary: Delete a recruiter note
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: integer
        - in: path
          name: noteId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Note deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /analytics/recruiter:
    get:
      operationId: getRecruiterAnalytics
      tags: [dashboard]
      summary: Get analytics data for the authenticated recruiter
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recruiter analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterAnalytics"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: string
      required: [message]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [candidate, recruiter]
      required: [name, email, password, role]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    RefreshBody:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [user, accessToken, refreshToken]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [candidate, recruiter]
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    Profile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        headline:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        experience:
          type: array
          items:
            $ref: "#/components/schemas/ExperienceItem"
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationItem"
        resumeUrl:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        user:
          $ref: "#/components/schemas/User"
      required: [id, userId, skills, experience, education, user]

    ExperienceItem:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        startDate:
          type: string
        endDate:
          type: string
          nullable: true
        current:
          type: boolean
        description:
          type: string
          nullable: true
      required: [title, company, startDate, current]

    EducationItem:
      type: object
      properties:
        degree:
          type: string
        institution:
          type: string
        field:
          type: string
        startYear:
          type: integer
        endYear:
          type: integer
          nullable: true
      required: [degree, institution, field, startYear]

    UpdateProfileBody:
      type: object
      properties:
        headline:
          type: string
        bio:
          type: string
        location:
          type: string
        phone:
          type: string
        skills:
          type: array
          items:
            type: string
        experience:
          type: array
          items:
            $ref: "#/components/schemas/ExperienceItem"
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationItem"

    UploadResumeBody:
      type: object
      properties:
        fileName:
          type: string
        fileData:
          type: string
          description: Base64 encoded PDF
      required: [fileName, fileData]

    ResumeUploadResponse:
      type: object
      properties:
        resumeUrl:
          type: string
      required: [resumeUrl]

    Company:
      type: object
      properties:
        id:
          type: integer
        recruiterId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        size:
          type: string
          nullable: true
        logoUrl:
          type: string
